  <rect x="306.726" y="216" width="373.28" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="318.726" y="230" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">UploadPreviewList</text>
<g class="subgraph" data-id="Item" data-label="UploadPreviewItem">
  <rect x="322.726" y="260" width="341.28" height="216.9" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="322.726" y="260" width="341.28" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="334.726" y="274" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">UploadPreviewItem</text>
<g class="subgraph" data-id="Form" data-label="UploadPreviewForm">
  <rect x="338.726" y="304" width="309.28" height="156.9" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="338.726" y="304" width="309.28" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="350.726" y="318" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">UploadPreviewForm</text>
<g class="subgraph" data-id="Step2" data-label="Credit Suppliers">
  <rect x="490.625" y="348" width="141.381" height="96.9" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="490.625" y="348" width="141.381" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="502.625" y="362" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">Credit Suppliers</text>
</g>
</g>
</g>
</g>
</g>
</g>
</g>
</g>
<g class="node" data-id="Dropzone" data-label="UploadDropzone" data-shape="rectangle">
  <rect x="104" y="336" width="142.726" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="175.363" y="354.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">UploadDropzone</text>
</g>
<g class="node" data-id="Step1" data-label="Add Details" data-shape="rectangle">
  <rect x="354.726" y="385" width="107.89900000000002" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="408.6755" y="403.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Add Details</text>
</g>
<g class="node" data-id="Rows" data-label="Credit rows" data-shape="rectangle">
  <rect x="506.625" y="385" width="109.381" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="561.3155" y="403.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Credit rows</text>
</g>
</svg>