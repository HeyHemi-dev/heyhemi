<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', system-ui, sans-serif; }
    svg {
      --_text:          var(--fg);
      --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
      --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
      --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
      --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
      --_badge:         color-mix(in srgb, var(--accent) 12%, var(--bg));
      --_badge-stroke:  color-mix(in srgb, var(--accent) 25%, var(--bg));
      --_badge-text:    color-mix(in srgb, var(--accent) 70%, var(--fg));
    }
  </style>

  <rect x="0" y="0" width="1200" height="630" fill="var(--bg)" />

  <g opacity="0.95">
    <rect x="80" y="90" width="1040" height="450" rx="24" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1.25" />
    <rect x="120" y="130" width="220" height="34" rx="10" fill="var(--_badge)" stroke="var(--_badge-stroke)" />
    <text x="230" y="152" font-size="14" text-anchor="middle" font-weight="600" fill="var(--_badge-text)">Patina • Internal Beta</text>

    <text x="120" y="230" font-size="44" font-weight="700" fill="var(--_text)">Custom MCP Server</text>
    <text x="120" y="270" font-size="18" font-weight="500" fill="var(--_text-muted)">Webhook workflows + MCP tools so AI agents can safely do real work across Patina’s stack.</text>

    <g>
      <rect x="120" y="330" width="220" height="64" rx="14" fill="var(--bg)" stroke="var(--_line)" />
      <text x="230" y="362" font-size="15" text-anchor="middle" font-weight="600" fill="var(--_text)">MCP (HTTP)</text>
      <text x="230" y="383" font-size="12" text-anchor="middle" fill="var(--_text-muted)">Agent tools</text>

      <rect x="370" y="330" width="220" height="64" rx="14" fill="var(--bg)" stroke="var(--_line)" />
      <text x="480" y="362" font-size="15" text-anchor="middle" font-weight="600" fill="var(--_text)">Webhooks</text>
      <text x="480" y="383" font-size="12" text-anchor="middle" fill="var(--_text-muted)">Automations</text>

      <rect x="620" y="330" width="220" height="64" rx="14" fill="var(--bg)" stroke="var(--_line)" />
      <text x="730" y="362" font-size="15" text-anchor="middle" font-weight="600" fill="var(--_text)">Flows</text>
      <text x="730" y="383" font-size="12" text-anchor="middle" fill="var(--_text-muted)">Orchestration</text>

      <rect x="870" y="330" width="210" height="64" rx="14" fill="var(--bg)" stroke="var(--_line)" />
      <text x="975" y="362" font-size="15" text-anchor="middle" font-weight="600" fill="var(--_text)">Provider APIs</text>
      <text x="975" y="383" font-size="12" text-anchor="middle" fill="var(--_text-muted)">Notion • Xero • Dropbox • Gmail</text>
    </g>
  </g>
</svg>
