  <rect x="290.726" y="172" width="405.28" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="302.726" y="186" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">when files.length &gt; 0</text>
<g class="subgraph" data-id="List" data-label="UploadPreviewList">
