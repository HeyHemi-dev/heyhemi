  <rect x="88" y="292" width="174.726" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="100" y="306" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">when files.length === 0</text>
</g>
<g class="subgraph" data-id="WhenFiles" data-label="when files.length &gt; 0">
